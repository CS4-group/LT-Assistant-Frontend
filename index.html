<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LT Assistant</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div id="app">
    </div>

    <!-- Login page -->
    <template id="login-template">
        <div class="page-container login-page">
            <div class="login-bg">
                <img src="title-bg.jpg" alt="" class="bg-image">
                <div class="bg-overlay"></div>
            </div>

            <div class="login-wrapper">
                <div class="login-header">
                    <img src="sift.png" alt="LT" class="logo">
                    <h1 class="app-title">LT Assistant</h1>
                    <p class="subtitle">Sign in to your account</p>
                </div> 

            <div class="login-wrapper">
                <div class="card">
                    <div class="card-header">
                        <h2 class="card-title">Login</h2>
                        <p class="card-description">Enter your credentials to access your dashboard</p>
                    </div>
                    <div class="card-content">
                        <form id="login-form" class="form">
                            <div class="form-group">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" id="email" name="email" class="form-input" placeholder="Enter your email" required>
                            </div>
                            <div class="form-group">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" id="password" name="password" class="form-input" placeholder="Enter your password" required>
                            </div>
                            <button type="submit" class="btn btn-primary btn-full">
                                <span class="btn-text">Sign in</span>
                                <span class="btn-loading hidden">Signing in...</span>
                            </button>
                        </form>
                        <div class="demo-notice">
                            <strong>Demo Mode:</strong> Enter any email and password to login!
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- Home page-->
    <template id="home-template">
        <div class="page-container home-page">
            <div class="home-bg">
                <img src="title-bg.jpg" alt="" class="bg-image">
                <div class="bg-overlay"></div>
            </div>
            
            <div class="home-header">
                <img src="sift.png" alt="LT" class="logo">
                <h1 class="app-title-large">LT Assistant</h1>
                <p class="tagline">Plan your path and rate experiences</p>
            </div>

            <div class="home-content">
                <div class="feature-grid">
                    <button class="feature-card planner-card" onclick="navigateTo('/planner')">
                        <span class="feature-title">Course Planner & AI</span>
                    </button>
                    <button class="feature-card rating-card" onclick="navigateTo('/rating')">
                        <span class="feature-title">Rating System</span>
                    </button>
                </div>
            </div>

            <div class="home-footer">
                <button class="btn btn-outline logout-btn" onclick="logout()">
                    <span>Logout</span>
                </button>
            </div>
        </div>
    </template>

    <!-- Rating page-->
    <template id="rating-template">
        <div class="page-container rating-page">
            <div class="page-bg">
                <img src="title-bg.jpg" alt="" class="bg-image">
                <div class="bg-overlay"></div>
            </div>
            <div class="planner-header">
                <div class="header-left">
                    <div>
                        <h1>Rating System</h1>
                        <p>Rate and review courses, clubs, and teachers</p>
                    </div>
                </div>
                <div class="header-right">
                    <button class="btn btn-outline" onclick="navigateTo('/')">Back</button>
                    <button class="btn btn-outline" id="header-add-review-btn" disabled>Add Review</button>
                </div>
            </div>

            <div class="tab-container">
                <button class="tab-button active" data-tab="courses">Courses</button>
                <button class="tab-button" data-tab="clubs">Clubs</button>
                <button class="tab-button" data-tab="teachers">Teachers</button>
            </div>

            <div class="search-container">
                <input type="text" id="search-input" class="form-input" placeholder="Search for a course...">
            </div>

            <div class="rating-content">
                <div class="sidebar">
                    <h2 id="sidebar-title">Courses List</h2>
                    <div id="items-list" class="items-list">
                    </div>
                </div>

                <div class="main-content">
                    <div id="item-details" class="item-details">
                        <p>Select an item from the list to see reviews.</p>
                    </div>
                </div>
            </div>

        </div>
    </template>

    <!-- Course page-->
    <template id="planner-template">
        <div class="page-container planner-page">
            <div class="page-bg">
                <img src="title-bg.jpg" alt="" class="bg-image">
                <div class="bg-overlay"></div>
            </div>
            <div class="planner-header">
                <div class="header-left">
                    <div>
                        <h1>Course Planner</h1>
                        <p>Plan your 4-year high school journey</p>
                    </div>
                </div>
                <div class="header-right">
                    <button class="btn btn-outline" onclick="navigateTo('/')">Back</button>
                    <button class="btn btn-outline" onclick="clearPlanner()">Reset Plan</button>
                </div>
            </div>

            <div class="planner-content">
                <div class="planner-grid">
                    <div class="year-section" data-year="Freshman">
                        <h3 class="year-title">Freshman Year</h3>
                        <div class="terms-container">
                            <div class="term-section" data-term="Fall">
                                <h4>Fall</h4>
                                <div class="course-slot" data-year="Freshman" data-term="Fall">
                                </div>
                            </div>
                            <div class="term-section" data-term="Spring">
                                <h4>Spring</h4>
                                <div class="course-slot" data-year="Freshman" data-term="Spring">
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="year-section" data-year="Sophomore">
                        <h3 class="year-title">Sophomore Year</h3>
                        <div class="terms-container">
                            <div class="term-section" data-term="Fall">
                                <h4>Fall</h4>
                                <div class="course-slot" data-year="Sophomore" data-term="Fall"></div>
                            </div>
                            <div class="term-section" data-term="Spring">
                                <h4>Spring</h4>
                                <div class="course-slot" data-year="Sophomore" data-term="Spring"></div>
                            </div>
                        </div>
                    </div>

                    <div class="year-section" data-year="Junior">
                        <h3 class="year-title">Junior Year</h3>
                        <div class="terms-container">
                            <div class="term-section" data-term="Fall">
                                <h4>Fall</h4>
                                <div class="course-slot" data-year="Junior" data-term="Fall"></div>
                            </div>
                            <div class="term-section" data-term="Spring">
                                <h4>Spring</h4>
                                <div class="course-slot" data-year="Junior" data-term="Spring"></div>
                            </div>
                        </div>
                    </div>

                    <div class="year-section" data-year="Senior">
                        <h3 class="year-title">Senior Year</h3>
                        <div class="terms-container">
                            <div class="term-section" data-term="Fall">
                                <h4>Fall</h4>
                                <div class="course-slot" data-year="Senior" data-term="Fall"></div>
                            </div>
                            <div class="term-section" data-term="Spring">
                                <h4>Spring</h4>
                                <div class="course-slot" data-year="Senior" data-term="Spring"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="chatbot-section">
                    <h3>AI Course Assistant</h3>
                    <div class="chatbot-container">
                        <div id="chatbot-messages" class="chatbot-messages">
                            <div class="message bot-message">
                                <div class="message-content">
                                    <p>Hi! I'm your AI course planning assistant. Tell me what courses you'd like to add to your schedule, and I'll help you place them in the right year and term.</p>
                                    <p><strong>Example:</strong> "Add AP Biology to Junior Fall" or "I want to take Spanish 2 in Sophomore Spring"</p>
                                </div>
                            </div>
                        </div>
                        <div class="chatbot-input-area">
                            <div class="input-container">
                                <input type="text" id="chatbot-input" class="chatbot-input" placeholder="Type your course request here..." />
                                <button id="chatbot-send" class="btn btn-primary chatbot-send-btn">Send</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <template id="loading-template">
        <div class="page-container loading-page">
            <div class="loading-spinner"></div>
        </div>
    </template>

    <script src="main.js"></script>
  </body>
</html>
