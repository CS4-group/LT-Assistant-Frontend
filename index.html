<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LT Assistant</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="drag-styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>
    <div id="app">
    </div>

    <!-- Theme Toggle Button -->
    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Dark Mode">
        <svg class="theme-icon" viewBox="0 0 24 24" fill="none" width="24" height="24">
            <mask id="moon-mask">
                <rect x="0" y="0" width="100%" height="100%" fill="white" />
                <circle class="moon-cutout" cx="24" cy="10" r="6" fill="black" />
            </mask>
            <circle class="sun-core" cx="12" cy="12" r="6" mask="url(#moon-mask)" fill="currentColor" />
            <g class="sun-rays" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <line x1="12" y1="1" x2="12" y2="3"></line>
                <line x1="12" y1="21" x2="12" y2="23"></line>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                <line x1="1" y1="12" x2="3" y2="12"></line>
                <line x1="21" y1="12" x2="23" y2="12"></line>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </g>
        </svg>
    </button>

    <!-- Landing page -->
    <template id="landing-template">
        <div class="page-container landing-page">

            <!-- Fixed Navbar -->
            <nav class="landing-nav">
                <div class="landing-nav-inner">
                    <div class="landing-nav-logo">
                        <img src="sift.png" alt="LT" class="landing-nav-logo-img">
                        <span class="landing-nav-brand">LT Assistant</span>
                    </div>
                    <button class="landing-nav-cta" onclick="navigateTo('/login')">
                        Launch App
                        <svg aria-hidden="true" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                    </button>
                </div>
            </nav>

            <!-- Hero Section -->
            <section class="landing-hero">
                <div class="landing-hero-bg"></div>
                <div class="landing-particles">
                    <span class="landing-particle" style="--i:0"></span>
                    <span class="landing-particle" style="--i:1"></span>
                    <span class="landing-particle" style="--i:2"></span>
                    <span class="landing-particle" style="--i:3"></span>
                    <span class="landing-particle" style="--i:4"></span>
                    <span class="landing-particle" style="--i:5"></span>
                    <span class="landing-particle" style="--i:6"></span>
                    <span class="landing-particle" style="--i:7"></span>
                    <span class="landing-particle" style="--i:8"></span>
                    <span class="landing-particle" style="--i:9"></span>
                    <span class="landing-particle" style="--i:10"></span>
                    <span class="landing-particle" style="--i:11"></span>
                    <span class="landing-particle" style="--i:12"></span>
                    <span class="landing-particle" style="--i:13"></span>
                    <span class="landing-particle" style="--i:14"></span>
                    <span class="landing-particle" style="--i:15"></span>
                    <span class="landing-particle" style="--i:16"></span>
                    <span class="landing-particle" style="--i:17"></span>
                    <span class="landing-particle" style="--i:18"></span>
                    <span class="landing-particle" style="--i:19"></span>
                </div>
                <div class="landing-hero-content">
                    <img src="sift.png" alt="LT Assistant" class="landing-hero-logo">
                    <h1 class="landing-hero-appname">LT Assistant</h1>
                    <p class="landing-hero-tagline">
                        <span class="landing-word" style="--word-i:0">Plan.</span>
                        <span class="landing-word" style="--word-i:1">Rate.</span>
                        <span class="landing-word" style="--word-i:2">Succeed.</span>
                    </p>
                    <p class="landing-hero-subtitle">Your AI-powered high school course planning companion</p>
                    <button class="landing-hero-btn" onclick="navigateTo('/login')">
                        <span>Launch App</span>
                        <svg aria-hidden="true" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                    </button>
                </div>
                <div class="landing-scroll-indicator">
                    <span>Scroll to explore</span>
                    <div class="landing-scroll-arrow">
                        <svg aria-hidden="true" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="m19 12-7 7-7-7"/></svg>
                    </div>
                </div>
            </section>

            <!-- Features Bento Grid -->
            <section class="landing-features">
                <h2 class="landing-section-title landing-reveal" data-reveal-delay="0">Everything you need</h2>
                <p class="landing-section-subtitle landing-reveal" data-reveal-delay="1">Powerful tools for every step of your high school journey</p>
                <div class="landing-bento">

                    <!-- Card 1: Course Rating (wide) -->
                    <div class="landing-bento-card landing-bento-card--wide landing-reveal" data-reveal-delay="0">
                        <div class="landing-bento-icon" aria-hidden="true">
                            <svg viewBox="0 0 80 80" class="landing-icon-svg landing-icon-stars">
                                <path class="landing-star landing-star-1" d="M40 10l7.5 15.2 16.8 2.4-12.15 11.85 2.87 16.7L40 48.1l-15.02 8.05 2.87-16.7L15.7 27.6l16.8-2.4z" fill="none" stroke="#fbbf24" stroke-width="2"/>
                                <path class="landing-star landing-star-2" d="M18 52l4 8.1 8.9 1.3-6.45 6.3 1.52 8.9L18 72.3l-7.97 4.3 1.52-8.9L5.1 61.4l8.9-1.3z" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.5"/>
                                <path class="landing-star landing-star-3" d="M62 50l4 8.1 8.9 1.3-6.45 6.3 1.52 8.9L62 70.3l-7.97 4.3 1.52-8.9-6.45-6.3 8.9-1.3z" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.5"/>
                                <circle class="landing-star-sparkle" cx="58" cy="14" r="1.5" fill="#fbbf24" opacity="0"/>
                                <circle class="landing-star-sparkle" cx="22" cy="18" r="1" fill="#fbbf24" opacity="0"/>
                            </svg>
                        </div>
                        <h3>Course Rating System</h3>
                        <p>Rate courses, clubs, and teachers with star ratings. Read authentic peer reviews, search and filter to make informed decisions about your classes.</p>
                    </div>

                    <!-- Card 2: 4-Year Planner -->
                    <div class="landing-bento-card landing-reveal" data-reveal-delay="1">
                        <div class="landing-bento-icon" aria-hidden="true">
                            <svg viewBox="0 0 80 80" class="landing-icon-svg landing-icon-calendar">
                                <rect class="landing-cal-frame" x="10" y="16" width="60" height="52" rx="6" fill="none" stroke="currentColor" stroke-width="2"/>
                                <line class="landing-cal-header" x1="10" y1="30" x2="70" y2="30" stroke="currentColor" stroke-width="2"/>
                                <line class="landing-cal-divider" x1="40" y1="30" x2="40" y2="68" stroke="currentColor" stroke-width="1" opacity="0.3"/>
                                <rect class="landing-cal-cell" x="16" y="35" width="10" height="8" rx="2" fill="currentColor" opacity="0" style="--cell-i:0"/>
                                <rect class="landing-cal-cell" x="30" y="35" width="10" height="8" rx="2" fill="currentColor" opacity="0" style="--cell-i:1"/>
                                <rect class="landing-cal-cell" x="44" y="35" width="10" height="8" rx="2" fill="currentColor" opacity="0" style="--cell-i:2"/>
                                <rect class="landing-cal-cell" x="58" y="35" width="10" height="8" rx="2" fill="currentColor" opacity="0" style="--cell-i:3"/>
                                <rect class="landing-cal-cell" x="16" y="47" width="10" height="8" rx="2" fill="currentColor" opacity="0" style="--cell-i:4"/>
                                <rect class="landing-cal-cell" x="30" y="47" width="10" height="8" rx="2" fill="currentColor" opacity="0" style="--cell-i:5"/>
                                <rect class="landing-cal-cell" x="44" y="47" width="10" height="8" rx="2" fill="currentColor" opacity="0" style="--cell-i:6"/>
                                <rect class="landing-cal-cell" x="58" y="47" width="10" height="8" rx="2" fill="currentColor" opacity="0" style="--cell-i:7"/>
                                <rect class="landing-cal-cell" x="16" y="59" width="10" height="6" rx="2" fill="currentColor" opacity="0" style="--cell-i:8"/>
                                <rect class="landing-cal-cell" x="30" y="59" width="10" height="6" rx="2" fill="currentColor" opacity="0" style="--cell-i:9"/>
                            </svg>
                        </div>
                        <h3>4-Year Course Planner</h3>
                        <p>Drag-and-drop scheduling across all four years with semester-by-semester views.</p>
                    </div>

                    <!-- Card 3: AI Assistant -->
                    <div class="landing-bento-card landing-reveal" data-reveal-delay="2">
                        <div class="landing-bento-icon" aria-hidden="true">
                            <svg viewBox="0 0 80 80" class="landing-icon-svg landing-icon-ai">
                                <rect class="landing-ai-bubble" x="12" y="14" width="56" height="36" rx="12" fill="none" stroke="currentColor" stroke-width="2"/>
                                <polygon class="landing-ai-tail" points="26,50 38,50 30,60" fill="none" stroke="currentColor" stroke-width="2"/>
                                <circle class="landing-ai-dot" cx="30" cy="32" r="3" fill="currentColor" style="--dot-i:0"/>
                                <circle class="landing-ai-dot" cx="40" cy="32" r="3" fill="currentColor" style="--dot-i:1"/>
                                <circle class="landing-ai-dot" cx="50" cy="32" r="3" fill="currentColor" style="--dot-i:2"/>
                                <path class="landing-ai-sparkle" d="M62 10l2 5 5 2-5 2-2 5-2-5-5-2 5-2z" fill="#fbbf24" opacity="0"/>
                                <path class="landing-ai-sparkle landing-ai-sparkle-2" d="M14 8l1.5 3.5 3.5 1.5-3.5 1.5-1.5 3.5-1.5-3.5-3.5-1.5 3.5-1.5z" fill="#ef4444" opacity="0"/>
                            </svg>
                        </div>
                        <h3>AI Course Assistant</h3>
                        <p>Natural language course requests and smart recommendations powered by AI.</p>
                    </div>

                    <!-- Card 4: Onboarding -->
                    <div class="landing-bento-card landing-reveal" data-reveal-delay="3">
                        <div class="landing-bento-icon" aria-hidden="true">
                            <svg viewBox="0 0 80 80" class="landing-icon-svg landing-icon-steps">
                                <line class="landing-step-line" x1="12" y1="40" x2="68" y2="40" stroke="currentColor" stroke-width="2" opacity="0.3"/>
                                <line class="landing-step-fill" x1="12" y1="40" x2="68" y2="40" stroke="#ef4444" stroke-width="2.5" stroke-dasharray="56" stroke-dashoffset="56"/>
                                <circle class="landing-step-dot" cx="12" cy="40" r="6" fill="none" stroke="currentColor" stroke-width="2" style="--step-i:0"/>
                                <circle class="landing-step-dot" cx="26" cy="40" r="6" fill="none" stroke="currentColor" stroke-width="2" style="--step-i:1"/>
                                <circle class="landing-step-dot" cx="40" cy="40" r="6" fill="none" stroke="currentColor" stroke-width="2" style="--step-i:2"/>
                                <circle class="landing-step-dot" cx="54" cy="40" r="6" fill="none" stroke="currentColor" stroke-width="2" style="--step-i:3"/>
                                <circle class="landing-step-dot" cx="68" cy="40" r="6" fill="none" stroke="currentColor" stroke-width="2" style="--step-i:4"/>
                                <path class="landing-step-check" d="M36 40l3 3 5-6" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0"/>
                            </svg>
                        </div>
                        <h3>Smart Onboarding</h3>
                        <p>Personalized 5-step profile setup with career path and interest matching.</p>
                    </div>

                    <!-- Card 5: Dark Mode -->
                    <div class="landing-bento-card landing-reveal" data-reveal-delay="4">
                        <div class="landing-bento-icon" aria-hidden="true">
                            <svg viewBox="0 0 80 80" class="landing-icon-svg landing-icon-theme">
                                <circle class="landing-theme-sun" cx="40" cy="40" r="12" fill="#fbbf24"/>
                                <g class="landing-theme-rays" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round">
                                    <line x1="40" y1="10" x2="40" y2="20"/>
                                    <line x1="40" y1="60" x2="40" y2="70"/>
                                    <line x1="13.8" y1="18.8" x2="20.8" y2="25.8"/>
                                    <line x1="59.2" y1="54.2" x2="66.2" y2="61.2"/>
                                    <line x1="10" y1="40" x2="20" y2="40"/>
                                    <line x1="60" y1="40" x2="70" y2="40"/>
                                    <line x1="13.8" y1="61.2" x2="20.8" y2="54.2"/>
                                    <line x1="59.2" y1="25.8" x2="66.2" y2="18.8"/>
                                </g>
                                <circle class="landing-theme-moon" cx="50" cy="34" r="11" fill="#0a0e1a" opacity="0"/>
                            </svg>
                        </div>
                        <h3>Dark Mode</h3>
                        <p>Beautiful dark and light themes that adapt to your preference.</p>
                    </div>

                </div>
            </section>

            <!-- Feature Spotlights -->
            <!-- Spotlight 1: Rating System -->
            <section class="landing-spotlight">
                <div class="landing-spotlight-inner landing-reveal" data-reveal-delay="0">
                    <div class="landing-spotlight-visual">
                        <div class="landing-spotlight-glow"></div>
                        <svg viewBox="0 0 200 160" class="landing-spotlight-svg" aria-hidden="true">
                            <!-- Rating UI mockup -->
                            <rect x="10" y="10" width="180" height="140" rx="12" fill="rgba(17,24,39,0.8)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
                            <!-- Tabs -->
                            <rect class="landing-spot-tab" x="20" y="20" width="45" height="20" rx="6" fill="#c42525" opacity="0.9"/>
                            <rect class="landing-spot-tab" x="70" y="20" width="35" height="20" rx="6" fill="rgba(255,255,255,0.1)"/>
                            <rect class="landing-spot-tab" x="110" y="20" width="45" height="20" rx="6" fill="rgba(255,255,255,0.1)"/>
                            <!-- Star row -->
                            <g class="landing-spot-stars" transform="translate(20, 55)">
                                <polygon points="8,0 10.5,5 16,6 12,10 13,16 8,13 3,16 4,10 0,6 5.5,5" fill="#fbbf24" class="landing-spot-star" style="--si:0"/>
                                <polygon points="28,0 30.5,5 36,6 32,10 33,16 28,13 23,16 24,10 20,6 25.5,5" fill="#fbbf24" class="landing-spot-star" style="--si:1"/>
                                <polygon points="48,0 50.5,5 56,6 52,10 53,16 48,13 43,16 44,10 40,6 45.5,5" fill="#fbbf24" class="landing-spot-star" style="--si:2"/>
                                <polygon points="68,0 70.5,5 76,6 72,10 73,16 68,13 63,16 64,10 60,6 65.5,5" fill="#fbbf24" class="landing-spot-star" style="--si:3"/>
                                <polygon points="88,0 90.5,5 96,6 92,10 93,16 88,13 83,16 84,10 80,6 85.5,5" fill="rgba(255,255,255,0.15)" class="landing-spot-star" style="--si:4"/>
                            </g>
                            <!-- Review bars -->
                            <rect class="landing-spot-bar" x="20" y="80" width="120" height="6" rx="3" fill="rgba(255,255,255,0.08)"/>
                            <rect class="landing-spot-bar-fill" x="20" y="80" width="0" height="6" rx="3" fill="#c42525" style="--bar-w:95"/>
                            <rect class="landing-spot-bar" x="20" y="92" width="120" height="6" rx="3" fill="rgba(255,255,255,0.08)"/>
                            <rect class="landing-spot-bar-fill" x="20" y="92" width="0" height="6" rx="3" fill="#c42525" style="--bar-w:72"/>
                            <rect class="landing-spot-bar" x="20" y="104" width="120" height="6" rx="3" fill="rgba(255,255,255,0.08)"/>
                            <rect class="landing-spot-bar-fill" x="20" y="104" width="0" height="6" rx="3" fill="#c42525" style="--bar-w:55"/>
                            <!-- Review card mockup -->
                            <rect x="20" y="118" width="160" height="24" rx="6" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
                        </svg>
                    </div>
                    <div class="landing-spotlight-text">
                        <span class="landing-spotlight-badge">Rating System</span>
                        <h2>Real reviews from real students</h2>
                        <p>Browse courses, clubs, and teachers with detailed ratings. Filter, search, and make confident choices backed by peer experiences.</p>
                        <ul class="landing-spotlight-features">
                            <li class="landing-reveal" data-reveal-delay="1">
                                <svg aria-hidden="true" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"><path d="M20 6 9 17l-5-5"/></svg>
                                Star ratings with detailed breakdowns
                            </li>
                            <li class="landing-reveal" data-reveal-delay="2">
                                <svg aria-hidden="true" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"><path d="M20 6 9 17l-5-5"/></svg>
                                Course, club, and teacher tabs
                            </li>
                            <li class="landing-reveal" data-reveal-delay="3">
                                <svg aria-hidden="true" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"><path d="M20 6 9 17l-5-5"/></svg>
                                Search and filter capabilities
                            </li>
                        </ul>
                    </div>
                </div>
            </section>

            <!-- Spotlight 2: Course Planner (reversed) -->
            <section class="landing-spotlight landing-spotlight--reverse">
                <div class="landing-spotlight-inner landing-reveal" data-reveal-delay="0">
                    <div class="landing-spotlight-visual">
                        <div class="landing-spotlight-glow landing-spotlight-glow--blue"></div>
                        <svg viewBox="0 0 200 160" class="landing-spotlight-svg" aria-hidden="true">
                            <rect x="10" y="10" width="180" height="140" rx="12" fill="rgba(17,24,39,0.8)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
                            <!-- Year tabs -->
                            <rect class="landing-spot-yr" x="20" y="20" width="32" height="18" rx="5" fill="#c42525"/>
                            <rect class="landing-spot-yr" x="56" y="20" width="32" height="18" rx="5" fill="rgba(255,255,255,0.08)"/>
                            <rect class="landing-spot-yr" x="92" y="20" width="32" height="18" rx="5" fill="rgba(255,255,255,0.08)"/>
                            <rect class="landing-spot-yr" x="128" y="20" width="32" height="18" rx="5" fill="rgba(255,255,255,0.08)"/>
                            <!-- Semester labels -->
                            <rect x="20" y="46" width="75" height="12" rx="4" fill="rgba(59,130,246,0.2)" stroke="rgba(59,130,246,0.3)" stroke-width="0.5"/>
                            <rect x="105" y="46" width="75" height="12" rx="4" fill="rgba(16,185,129,0.2)" stroke="rgba(16,185,129,0.3)" stroke-width="0.5"/>
                            <!-- Course slots -->
                            <rect class="landing-spot-slot" x="20" y="64" width="75" height="12" rx="4" fill="rgba(255,255,255,0.06)" style="--slot-i:0"/>
                            <rect class="landing-spot-slot" x="20" y="80" width="75" height="12" rx="4" fill="rgba(255,255,255,0.06)" style="--slot-i:1"/>
                            <rect class="landing-spot-slot" x="20" y="96" width="75" height="12" rx="4" fill="rgba(255,255,255,0.06)" style="--slot-i:2"/>
                            <rect class="landing-spot-slot" x="20" y="112" width="75" height="12" rx="4" fill="rgba(255,255,255,0.06)" style="--slot-i:3"/>
                            <rect class="landing-spot-slot" x="105" y="64" width="75" height="12" rx="4" fill="rgba(255,255,255,0.06)" style="--slot-i:4"/>
                            <rect class="landing-spot-slot" x="105" y="80" width="75" height="12" rx="4" fill="rgba(255,255,255,0.06)" style="--slot-i:5"/>
                            <rect class="landing-spot-slot" x="105" y="96" width="75" height="12" rx="4" fill="rgba(255,255,255,0.06)" style="--slot-i:6"/>
                            <rect class="landing-spot-slot" x="105" y="112" width="75" height="12" rx="4" fill="rgba(255,255,255,0.06)" style="--slot-i:7"/>
                            <!-- Drag indicator -->
                            <rect class="landing-spot-drag" x="22" y="66" width="71" height="8" rx="3" fill="rgba(196,37,37,0.4)" stroke="#c42525" stroke-width="0.5" stroke-dasharray="3 2" opacity="0"/>
                        </svg>
                    </div>
                    <div class="landing-spotlight-text">
                        <span class="landing-spotlight-badge landing-spotlight-badge--blue">Course Planner</span>
                        <h2>Map your entire high school journey</h2>
                        <p>Intuitive drag-and-drop interface to plan courses across all four years. Organize by semester with real-time updates and validation.</p>
                        <ul class="landing-spotlight-features">
                            <li class="landing-reveal" data-reveal-delay="1">
                                <svg aria-hidden="true" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"><path d="M20 6 9 17l-5-5"/></svg>
                                Drag-and-drop course scheduling
                            </li>
                            <li class="landing-reveal" data-reveal-delay="2">
                                <svg aria-hidden="true" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"><path d="M20 6 9 17l-5-5"/></svg>
                                Year-by-year tab navigation
                            </li>
                            <li class="landing-reveal" data-reveal-delay="3">
                                <svg aria-hidden="true" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"><path d="M20 6 9 17l-5-5"/></svg>
                                Fall and Spring semester views
                            </li>
                        </ul>
                    </div>
                </div>
            </section>

            <!-- Spotlight 3: AI Assistant -->
            <section class="landing-spotlight">
