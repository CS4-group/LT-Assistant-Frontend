<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LT Assistant</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="drag-styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>
    <div id="app">
    </div>

    <!-- Theme Toggle Button -->
    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Dark Mode">
        <svg class="theme-icon" viewBox="0 0 24 24" fill="none" width="24" height="24">
            <mask id="moon-mask">
                <rect x="0" y="0" width="100%" height="100%" fill="white" />
                <circle class="moon-cutout" cx="24" cy="10" r="6" fill="black" />
            </mask>
            <circle class="sun-core" cx="12" cy="12" r="6" mask="url(#moon-mask)" fill="currentColor" />
            <g class="sun-rays" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <line x1="12" y1="1" x2="12" y2="3"></line>
                <line x1="12" y1="21" x2="12" y2="23"></line>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                <line x1="1" y1="12" x2="3" y2="12"></line>
                <line x1="21" y1="12" x2="23" y2="12"></line>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </g>
        </svg>
    </button>

    <!-- Login page -->
    <template id="login-template">
        <div class="page-container login-page">
            <div class="login-bg">
                <img src="title-bg.jpg" alt="" class="bg-image">
                <div class="bg-overlay"></div>
            </div>

            <div class="login-wrapper">
                <div class="login-header">
                    <img src="sift.png" alt="LT" class="logo">
                    <h1 class="app-title">LT Assistant</h1>
                    <p class="subtitle">Sign in to your account</p>
                </div>

                <div class="login-wrapper">
                    <div class="card">
                        <div class="card-header">
                            <h2 class="card-title">Login</h2>
                            <p class="card-description">Sign in with your Google account</p>
                        </div>
                        <div class="card-content">
                            <div class="google-signin-container">
                                <div id="g_id_onload"
                                    data-client_id="1076207663943-9urdbi6g6fbnblt45kbdr6h3tn32p653.apps.googleusercontent.com"
                                    data-callback="handleGoogleSignIn" data-auto_prompt="false">
                                </div>
                                <div class="g_id_signin" data-type="standard" data-size="large" data-theme="outline"
                                    data-text="sign_in_with" data-shape="rectangular" data-logo_alignment="left"
                                    data-width="350">
                                </div>
                            </div>
                            <div class="signin-loading hidden" id="signin-loading">
                                <div class="loading-spinner-small"></div>
                                <p>Signing you in...</p>
                            </div>
                            <div class="bypass-divider">
                                <span>or</span>
                            </div>
                            <button id="bypass-login-btn" class="bypass-btn">
                                Continue without signing in
                            </button>
                        </div>
                    </div>
                </div>
            </div>
    </template>

    <!-- Home page-->
    <template id="home-template">
        <div class="page-container home-page">
            <div class="home-bg">
                <img src="title-bg.jpg" alt="" class="bg-image">
                <div class="bg-overlay"></div>
            </div>

            <div class="user-profile-section">
                <div class="user-profile">
                    <img id="user-avatar" src="" alt="User" class="user-avatar">
                    <div class="user-info">
                        <span id="user-name" class="user-name"></span>
                        <span id="user-email" class="user-email"></span>
                    </div>
                </div>
            </div>

            <div class="home-header">
                <img src="sift.png" alt="LT" class="logo">
                <h1 class="app-title-large">LT Assistant</h1>
                <p class="tagline">Plan your path and rate experiences</p>
            </div>

            <div class="home-content">
                <div class="feature-grid">
                    <button class="feature-card planner-card" onclick="navigateTo('/planner')">
                        <span class="feature-title">Course Planner & AI</span>
                    </button>
                    <button class="feature-card rating-card" onclick="navigateTo('/rating')">
                        <span class="feature-title">Rating System</span>
                    </button>
                </div>
            </div>

            <div class="home-footer">
                <button class="btn btn-outline logout-btn" onclick="logout()">
                    <span>Logout</span>
                </button>
            </div>
        </div>
    </template>

    <!-- Rating page-->
    <template id="rating-template">
        <div class="page-container rating-page">
            <div class="page-bg">
                <img src="title-bg.jpg" alt="" class="bg-image">
                <div class="bg-overlay"></div>
            </div>

            <div class="rating-top-bar">
                <div class="rating-top-row">
                    <div class="header-left">
                        <h1>Rating System</h1>
                    </div>
                    <div class="header-right">
                        <button class="btn btn-floating" onclick="navigateTo('/')">← Back</button>
                    </div>
                </div>
                <div class="rating-controls-row">
                    <div class="tab-container">
                        <button class="tab-button active" data-tab="courses">Courses</button>
                        <button class="tab-button" data-tab="clubs">Clubs</button>
                        <button class="tab-button" data-tab="teachers">Teachers</button>
                    </div>
                    <div class="search-container">
                        <input type="text" id="search-input" class="form-input" placeholder="Search for a course...">
                    </div>
                </div>
            </div>

            <div class="rating-content">
                <div class="sidebar">
                    <h2 id="sidebar-title">Courses List</h2>
                    <div id="items-list" class="items-list">
                    </div>
                </div>

                <div class="main-content">
                    <div id="item-details" class="item-details">
                        <p>Select an item from the list to see reviews.</p>
                    </div>
                    <button class="btn floating-add-review-btn" id="header-add-review-btn" disabled>+ Add
                        Review</button>
                </div>
            </div>

        </div>
    </template>

    <!-- Course page-->
    <template id="planner-template">
        <div class="page-container planner-page">
            <div class="page-bg">
                <img src="title-bg.jpg" alt="" class="bg-image">
                <div class="bg-overlay"></div>
            </div>
            <div class="planner-header">
                <div class="header-left">
                    <div>
                        <h1>Course Planner</h1>
                        <p>Plan your 4-year high school journey</p>
                    </div>
                </div>
                <div class="header-right">
                    <button class="btn btn-outline" onclick="navigateTo('/')">Back</button>
                    <button class="btn btn-outline" onclick="clearPlanner()">Reset Plan</button>
                </div>
            </div>

            <div class="planner-content">
                <div class="planner-grid">
                    <div class="planner-tabs">
                        <button class="planner-tab active" data-year="Freshman">9th</button>
                        <button class="planner-tab" data-year="Sophomore">10th</button>
                        <button class="planner-tab" data-year="Junior">11th</button>
                        <button class="planner-tab" data-year="Senior">12th</button>
                    </div>
                    <div class="planner-year-content" id="planner-year-content">
                    </div>
                </div>

                <div class="chatbot-section">
                    <h3>AI Course Assistant</h3>
                    <div class="chatbot-container">
                        <div id="chatbot-messages" class="chatbot-messages">
                            <div class="message bot-message">
                                <div class="message-avatar">🤖</div>
                                <div class="message-content">
                                    <p>Hi! I'm your AI course planning assistant. Tell me what courses you'd like to add
                                        to your schedule, and I'll help you place them in the right year and term.</p>
                                    <p><strong>Example:</strong> "Add AP Biology to Junior Fall" or "I want to take
                                        Spanish 2 in Sophomore Spring"</p>
                                </div>
                            </div>
                        </div>
                        <div class="chatbot-input-area">
                            <div class="input-container">
                                <input type="text" id="chatbot-input" class="chatbot-input"
                                    placeholder="Type your course request here..." />
                                <button id="chatbot-send" class="btn btn-primary chatbot-send-btn">Send <span
                                        class="send-arrow">→</span></button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        </div>
    </template>

    <!-- Onboarding page -->
    <template id="onboarding-template">
        <div class="page-container onboarding-page">
            <div class="login-bg">
                <img src="title-bg.jpg" alt="" class="bg-image">
                <div class="bg-overlay"></div>
            </div>

            <div class="onboarding-wrapper">
                <div class="onboarding-header">
                    <img src="sift.png" alt="LT" class="logo">
                    <h1 class="app-title">LT Assistant</h1>
                    <p class="subtitle">Let's personalize your experience</p>
                </div>

                <div class="onboarding-card card">
                    <!-- Progress bar -->
                    <div class="onboarding-progress">
                        <div class="progress-track">
                            <div class="progress-fill" id="onboarding-progress-fill"></div>
                        </div>
                        <span class="progress-label" id="onboarding-progress-label">Step 1 of 5</span>
                    </div>

                    <!-- Step 1: Grade Level -->
                    <div class="onboarding-step active" data-step="1">
                        <h2 class="step-title">What grade are you in?</h2>
                        <p class="step-subtitle">We'll tailor your course plan to your current year.</p>
                        <div class="option-grid option-grid-2">
                            <button class="option-card" data-field="gradeLevel" data-value="Freshman">
                                <span class="option-label">Freshman</span>
                                <span class="option-sub">9th Grade</span>
                            </button>
                            <button class="option-card" data-field="gradeLevel" data-value="Sophomore">
                                <span class="option-label">Sophomore</span>
                                <span class="option-sub">10th Grade</span>
                            </button>
                            <button class="option-card" data-field="gradeLevel" data-value="Junior">
                                <span class="option-label">Junior</span>
                                <span class="option-sub">11th Grade</span>
                            </button>
                            <button class="option-card" data-field="gradeLevel" data-value="Senior">
                                <span class="option-label">Senior</span>
                                <span class="option-sub">12th Grade</span>
                            </button>
                        </div>
                    </div>

                    <!-- Step 2: Career Path -->
                    <div class="onboarding-step" data-step="2">
                        <h2 class="step-title">What's your intended career path?</h2>
                        <p class="step-subtitle">This helps us recommend the right courses for your future.</p>
                        <div class="option-grid option-grid-2">
                            <button class="option-card" data-field="careerPath" data-value="STEM">
                                <span class="option-label">STEM</span>
                                <span class="option-sub">Science, Technology, Engineering, Math</span>
                            </button>
                            <button class="option-card" data-field="careerPath" data-value="Medicine/Healthcare">
                                <span class="option-label">Medicine / Healthcare</span>
                                <span class="option-sub">Doctor, Nurse, Therapist...</span>
                            </button>
                            <button class="option-card" data-field="careerPath" data-value="Business/Finance">
                                <span class="option-label">Business / Finance</span>
                                <span class="option-sub">Entrepreneur, Analyst, Banker...</span>
                            </button>
                            <button class="option-card" data-field="careerPath" data-value="Law/Government">
                                <span class="option-label">Law / Government</span>
                                <span class="option-sub">Lawyer, Policy, Public Service...</span>
                            </button>
                            <button class="option-card" data-field="careerPath" data-value="Arts/Humanities">
                                <span class="option-label">Arts / Humanities</span>
                                <span class="option-sub">Writing, Design, Philosophy...</span>
                            </button>
                            <button class="option-card" data-field="careerPath" data-value="Education">
                                <span class="option-label">Education</span>
                                <span class="option-sub">Teaching, Research, Academia...</span>
                            </button>
                            <button class="option-card option-card-wide" data-field="careerPath" data-value="Undecided">
                                <span class="option-label">Undecided</span>
                                <span class="option-sub">Still exploring my options</span>
                            </button>
                        </div>
                    </div>

                    <!-- Step 3: College Goals -->
                    <div class="onboarding-step" data-step="3">
                        <h2 class="step-title">What are your college goals?</h2>
                        <p class="step-subtitle">We'll help you build the right academic profile.</p>
                        <div class="option-grid option-grid-1">
                            <button class="option-card" data-field="collegeGoals" data-value="Ivy League / Top 10">
                                <span class="option-label">Ivy League / Top 10</span>
                                <span class="option-sub">Harvard, MIT, Stanford, etc.</span>
                            </button>
                            <button class="option-card" data-field="collegeGoals" data-value="Top 25-50">
                                <span class="option-label">Top 25–50 University</span>
                                <span class="option-sub">Highly selective national universities</span>
                            </button>
                            <button class="option-card" data-field="collegeGoals" data-value="State School">
                                <span class="option-label">State / Public University</span>
                                <span class="option-sub">Great value and strong programs</span>
                            </button>
                            <button class="option-card" data-field="collegeGoals" data-value="Community College">
                                <span class="option-label">Community College</span>
                                <span class="option-sub">Two-year college or transfer path</span>
                            </button>
                            <button class="option-card" data-field="collegeGoals" data-value="Undecided">
                                <span class="option-label">Undecided</span>
                                <span class="option-sub">Haven't decided yet</span>
                            </button>
                        </div>
                    </div>

                    <!-- Step 4: Academic Interests -->
                    <div class="onboarding-step" data-step="4">
                        <h2 class="step-title">What subjects interest you most?</h2>
                        <p class="step-subtitle">Select all that apply — your AI assistant will use these to guide
                            recommendations.</p>
                        <div class="option-grid option-grid-3">
                            <button class="option-card multi-select" data-field="academicInterests" data-value="Math">
                                <span class="option-label">Math</span>
                            </button>
                            <button class="option-card multi-select" data-field="academicInterests"
                                data-value="Science">
                                <span class="option-label">Science</span>
                            </button>
                            <button class="option-card multi-select" data-field="academicInterests"
                                data-value="English/Literature">
                                <span class="option-label">English / Literature</span>
                            </button>
                            <button class="option-card multi-select" data-field="academicInterests"
                                data-value="History">
                                <span class="option-label">History</span>
                            </button>
                            <button class="option-card multi-select" data-field="academicInterests"
                                data-value="Computer Science">
                                <span class="option-label">Computer Science</span>
                            </button>
                            <button class="option-card multi-select" data-field="academicInterests"
                                data-value="Foreign Languages">
                                <span class="option-label">Foreign Languages</span>
                            </button>
                            <button class="option-card multi-select" data-field="academicInterests" data-value="Arts">
                                <span class="option-label">Arts</span>
                            </button>
                            <button class="option-card multi-select" data-field="academicInterests"
                                data-value="Social Studies">
                                <span class="option-label">Social Studies</span>
                            </button>
                        </div>
                    </div>

                    <!-- Step 5: GPA Goal -->
                    <div class="onboarding-step" data-step="5">
                        <h2 class="step-title">What's your GPA goal?</h2>
                        <p class="step-subtitle">This helps us suggest the right course difficulty for you.</p>
                        <div class="option-grid option-grid-1">
                            <button class="option-card" data-field="gpaGoal" data-value="4.0+">
                                <span class="option-label">4.0+</span>
                                <span class="option-sub">Aiming for a perfect GPA / top of class</span>
                            </button>
                            <button class="option-card" data-field="gpaGoal" data-value="3.5-3.9">
                                <span class="option-label">3.5 – 3.9</span>
                                <span class="option-sub">Strong academic performance</span>
                            </button>
                            <button class="option-card" data-field="gpaGoal" data-value="3.0-3.4">
                                <span class="option-label">3.0 – 3.4</span>
                                <span class="option-sub">Solid, well-rounded student</span>
                            </button>
                            <button class="option-card" data-field="gpaGoal" data-value="2.5-2.9">
                                <span class="option-label">2.5 – 2.9</span>
                                <span class="option-sub">Balancing coursework with other priorities</span>
                            </button>
                            <button class="option-card" data-field="gpaGoal" data-value="Just passing">
                                <span class="option-label">Just Passing</span>
                                <span class="option-sub">Focused on completing requirements</span>
                            </button>
                        </div>
                    </div>

                    <!-- Navigation buttons -->
                    <div class="onboarding-nav">
                        <button class="btn btn-outline" id="onboarding-back-btn">Back</button>
                        <button class="btn btn-primary" id="onboarding-next-btn" disabled>Next</button>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- Landing Page -->
    <template id="landing-template">
        <div class="landing-page">
            <!-- Nav -->
            <nav class="landing-nav" id="landing-nav">
                <div class="landing-nav-inner">
                    <a href="#/landing" class="landing-logo">
                        <img src="sift.png" alt="LT Assistant" class="landing-logo-img">
                        <span class="landing-logo-text">LT Assistant</span>
                    </a>
                    <a href="#/login" class="landing-nav-cta">Sign Up</a>
                </div>
            </nav>

            <!-- Hero -->
            <section class="landing-hero">
                <div class="landing-hero-bg">
                    <img src="title-bg.jpg" alt="" class="landing-hero-img">
                    <div class="landing-hero-overlay"></div>
                </div>
                <div class="landing-hero-content">
                    <div class="landing-hero-badge">Lake Travis High School</div>
                    <h1 class="landing-hero-title">
                        <span class="landing-hero-line">Plan Your Path.</span>
                        <span class="landing-hero-line landing-hero-line--accent">Rate Your Experience.</span>
                    </h1>
                    <p class="landing-hero-sub">The all-in-one course planning and peer review platform built by Cavs, for Cavs.</p>
                    <div class="landing-hero-actions">
                        <a href="#/login" class="landing-btn landing-btn--primary">Get Started</a>
                        <button class="landing-btn landing-btn--ghost" data-scroll-to="landing-features">Learn More</button>
                    </div>
                </div>
                <div class="landing-hero-scroll">
                    <div class="landing-scroll-line"></div>
                </div>
            </section>

            <!-- Features -->
            <section class="landing-features" id="landing-features">
                <div class="landing-container">
                    <div class="landing-section-header">
                        <span class="landing-overline">Features</span>
                        <h2 class="landing-section-title">Everything you need to<br>navigate high school</h2>
                    </div>
                    <div class="landing-features-grid">
                        <div class="landing-feature-card" data-landing-reveal>
                            <div class="landing-feature-icon">
                                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                                    <line x1="16" y1="2" x2="16" y2="6"></line>
                                    <line x1="8" y1="2" x2="8" y2="6"></line>
                                    <line x1="3" y1="10" x2="21" y2="10"></line>
                                </svg>
                            </div>
                            <h3 class="landing-feature-name">4-Year Course Planner</h3>
                            <p class="landing-feature-desc">Drag and drop courses to build your perfect high school schedule. Plan all four years with an intuitive, visual interface.</p>
                        </div>
                        <div class="landing-feature-card" data-landing-reveal>
                            <div class="landing-feature-icon landing-feature-icon--red">
                                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                    <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
                                </svg>
                            </div>
                            <h3 class="landing-feature-name">Peer Ratings & Reviews</h3>
                            <p class="landing-feature-desc">Read honest reviews from fellow students on courses, teachers, and clubs. Share your own experience to help others decide.</p>
                        </div>
                        <div class="landing-feature-card" data-landing-reveal>
                            <div class="landing-feature-icon landing-feature-icon--amber">
                                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                                    <line x1="9" y1="9" x2="15" y2="9"></line>
                                    <line x1="12" y1="6" x2="12" y2="12"></line>
                                </svg>
                            </div>
                            <h3 class="landing-feature-name">AI Course Assistant</h3>
                            <p class="landing-feature-desc">Get personalized course recommendations from our built-in AI chatbot. Ask about prerequisites, workload, or the best path for your goals.</p>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Stats -->
            <section class="landing-stats">
                <div class="landing-container">
                    <div class="landing-stats-grid">
                        <div class="landing-stat" data-landing-reveal>
                            <span class="landing-stat-number" data-count-to="200">0</span><span class="landing-stat-suffix">+</span>
                            <span class="landing-stat-label">Courses Listed</span>
                        </div>
                        <div class="landing-stat" data-landing-reveal>
                            <span class="landing-stat-number" data-count-to="50">0</span><span class="landing-stat-suffix">+</span>
                            <span class="landing-stat-label">Clubs & Activities</span>
                        </div>
                        <div class="landing-stat" data-landing-reveal>
                            <span class="landing-stat-number" data-count-to="4">0</span><span class="landing-stat-suffix"></span>
                            <span class="landing-stat-label">Year Plan Builder</span>
                        </div>
                        <div class="landing-stat" data-landing-reveal>
                            <span class="landing-stat-number" data-count-to="100">0</span><span class="landing-stat-suffix">%</span>
                            <span class="landing-stat-label">Free for Students</span>
                        </div>
                    </div>
                </div>
            </section>

            <!-- How It Works -->
            <section class="landing-steps">
                <div class="landing-container">
                    <div class="landing-section-header">
                        <span class="landing-overline">How It Works</span>
                        <h2 class="landing-section-title">Get started in minutes</h2>
                    </div>
                    <div class="landing-steps-grid">
                        <div class="landing-step" data-landing-reveal>
                            <span class="landing-step-num">01</span>
                            <h3 class="landing-step-title">Sign In</h3>
                            <p class="landing-step-desc">Use your Google account to create your profile in seconds. No passwords to remember.</p>
                        </div>
                        <div class="landing-step" data-landing-reveal>
